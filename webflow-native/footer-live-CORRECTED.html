<script>
document.addEventListener('DOMContentLoaded', function() {
    console.log('Script loaded');
    const waLinks = document.querySelectorAll('a[href*="wa.me"], a[href*="whatsapp"]');
    console.log('WhatsApp links found:', waLinks.length);
    waLinks.forEach(function(link) {
        link.addEventListener('click', function(e) {
            e.preventDefault();
            console.log('WhatsApp button clicked');
            const refId = 'R' + Math.floor(100000 + Math.random() * 900000);
            console.log('Ref ID:', refId);
            const urlParams = new URLSearchParams(window.location.search);
            const gclid = urlParams.get('gclid') || '';
            const gadSource = urlParams.get('gad_source') || '';
            const utmSource = urlParams.get('utm_source') || '';
            const utmMedium = urlParams.get('utm_medium') || '';
            const utmCampaign = urlParams.get('utm_campaign') || '';
            const fbclid = urlParams.get('fbclid') || '';
            const msclkid = urlParams.get('msclkid') || '';
            let leadSource = 'Website';
            if (gclid || gadSource) {
                leadSource = 'Google Ads';
            } else if (fbclid || utmSource === 'facebook' || utmSource === 'instagram' || utmSource === 'meta' || utmSource === 'fb' || utmSource === 'ig') {
                leadSource = utmMedium === 'social' ? 'Meta Organic' : 'Meta Ads';
            } else if (msclkid) {
                leadSource = 'Bing Ads';
            } else if (window.location.pathname.includes('/blog')) {
                leadSource = 'Blog';
            }
            const now = new Date();
            const timestamp = now.getFullYear() + '-' +
                String(now.getMonth() + 1).padStart(2, '0') + '-' +
                String(now.getDate()).padStart(2, '0') + 'T' +
                String(now.getHours()).padStart(2, '0') + ':' +
                String(now.getMinutes()).padStart(2, '0') + ':' +
                String(now.getSeconds()).padStart(2, '0') + '+01:00';
            const form = document.getElementById('wf-form-WA-Tracking');
            console.log('Form found:', form);
            if (form) {
                const refInput = form.querySelector('input[name="ref_id"]');
                const gclidInput = form.querySelector('input[name="gclid"]');
                console.log('ref_id input:', refInput);
                console.log('gclid input:', gclidInput);
                if (refInput) refInput.value = refId;
                if (gclidInput) gclidInput.value = gclid;
                form.querySelector('input[name="utm_source"]').value = utmSource;
                form.querySelector('input[name="utm_medium"]').value = utmMedium;
                form.querySelector('input[name="utm_campaign"]').value = utmCampaign;
                form.querySelector('input[name="page"]').value = window.location.pathname;
                form.querySelector('input[name="timestamp"]').value = timestamp;
                form.querySelector('input[name="lead_source"]').value = leadSource;
                console.log('Submitting form...');
                const submitBtn = form.querySelector('input[type="submit"]');
                console.log('Submit button:', submitBtn);
                if (submitBtn) {
                    submitBtn.click();
                    console.log('Form submitted via button click');
                } else {
                    form.submit();
                    console.log('Form submitted via form.submit()');
                }
            } else {
                console.log('Form NOT found!');
            }
            const waUrl = 'https://wa.me/498000009533?text=' + encodeURIComponent('Hallo, ich habe Interesse. (Ref: ' + refId + ')');
            window.open(waUrl, '_blank');
        });
    });
});
</script>

<!-- RUFHELD blog loader (FINAL, self-updating — do not edit) -->
<script>
(function(){
  if(!/\/blog\//.test(location.pathname)) return;
  var B='https://cdn.jsdelivr.net/gh/Rufheld/web-assets@';
  function L(u){var s=document.createElement('script');s.src=u;s.defer=true;document.head.appendChild(s);}
  try{var c=JSON.parse(localStorage.getItem('rh_sha')||'null');
      if(c&&c.s&&Date.now()-c.t<300000){L(B+c.s+'/blog-core.js');return;}}catch(e){}
  fetch('https://api.github.com/repos/Rufheld/web-assets/commits/main',{cache:'no-store'})
   .then(function(r){return r.json();})
   .then(function(d){if(d&&d.sha){try{localStorage.setItem('rh_sha',JSON.stringify({s:d.sha,t:Date.now()}));}catch(e){}L(B+d.sha+'/blog-core.js');}
                     else L(B+'main/blog-core.js?v='+Date.now());})
   .catch(function(){L(B+'main/blog-core.js?v='+Date.now());});
})();
</script>
